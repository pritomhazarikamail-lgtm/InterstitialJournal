<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!--
        SECURITY: Content Security Policy
        - script-src: only our own origin + the two trusted Google scripts needed for OAuth.
          'unsafe-inline' is intentionally absent; all JS lives in this file under type="module".
          NOTE: GitHub Pages serves this as text/html so a <meta> CSP is the only option.
        - connect-src: googleapis only — blocks data exfiltration to unknown hosts.
        - object-src / base-uri: locked to 'none' to prevent plugin injection & base-tag hijacking.
        - img-src: self + data URIs (icons).
        - frame-ancestors: 'none' — prevents click-jacking.
        - style-src: 'unsafe-inline' is required because all CSS is inline in this single-file app.
    -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        script-src 'self' https://accounts.google.com/gsi/client
                   https://cdn.jsdelivr.net 'unsafe-inline' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        connect-src https://www.googleapis.com https://accounts.google.com
                    https://cdn.jsdelivr.net
                    https://huggingface.co https://*.huggingface.co
                    https://hf.co https://*.hf.co;
        img-src 'self' data:;
        font-src 'none' https://fonts.gstatic.com;
        object-src 'none';
        base-uri 'none';
        frame-ancestors 'none';
        form-action 'none';
    ">
    <!-- SECURITY: Prevent browsers from sniffing MIME types -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- SECURITY: No referrer leakage to external origins -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Interstitial Journal</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007aff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="journal_icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f4f0;
            --text: #1a1814;
            --accent: #3d6bff;
            --accent-soft: rgba(61,107,255,0.12);
            --secondary: #ffffff;
            --border: #e2e0db;
            --card-bg: #ffffff;
            --success: #1a9e5c;
            --danger: #d63b2f;
            --muted: #7a7670;
            --surface2: #f0ede8;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
        }
        body.dark-mode {
            --bg: #111010;
            --text: #f0ede8;
            --accent: #5b84ff;
            --accent-soft: rgba(91,132,255,0.15);
            --secondary: #1e1d1c;
            --border: #2a2825;
            --card-bg: #1a1917;
            --muted: #857f78;
            --surface2: #1e1d1c;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 88px;
            min-height: 100dvh;
        }
        .container {
            width: 100%;
            max-width: 520px;
            padding-top: max(24px, env(safe-area-inset-top));
            padding-left: 20px;
            padding-right: 20px;
        }
        /* ── Bottom Nav ── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            z-index: 1000;
            box-shadow: 0 -1px 0 var(--border), 0 -8px 24px rgba(0,0,0,0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .nav-item {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            transition: color 0.2s, background 0.2s;
            letter-spacing: 0.02em;
        }
        .nav-item .nav-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.2s, transform 0.15s;
            font-size: 1.1rem;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item.active .nav-icon { background: var(--accent-soft); transform: scale(1.1); }
        /* ── Cards ── */
        .note-item {
            background: var(--card-bg);
            padding: 18px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 4px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            animation: slideUp 0.25s ease-out both;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .note-item:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ── Textarea ── */
        textarea {
            width: 100%;
            height: 180px;
            padding: 18px 20px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            resize: none;
            outline: none;
            background: var(--card-bg);
            color: var(--text);
            box-shadow: var(--shadow-sm);
            margin-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.7;
        }
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-sm);
        }
        textarea::placeholder { color: var(--muted); opacity: 0.7; }
        /* ── Tags ── */
        .tag {
            background: var(--surface2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid var(--border);
            margin-right: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            color: var(--accent);
            transition: background 0.2s, transform 0.15s;
            letter-spacing: 0.01em;
        }
        .tag:hover { background: var(--accent-soft); transform: translateY(-1px); }
        /* ── Calendar ── */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 28px; }
        .calendar-day {
            aspect-ratio: 1;
            border-radius: 9px;
            cursor: pointer;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.15s ease;
            border: 1.5px solid transparent;
            background: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .calendar-day.lvl-1 { background-color: rgba(61,107,255,0.12); color: var(--accent); }
        .calendar-day.lvl-2 { background-color: rgba(61,107,255,0.28); color: var(--accent); font-weight: 700; }
        .calendar-day.lvl-3 { background-color: rgba(61,107,255,0.55); color: white; font-weight: 700; }
        .calendar-day.lvl-4 { background-color: var(--accent); color: white; font-weight: 700; box-shadow: 0 2px 8px rgba(61,107,255,0.35); }
        .calendar-day:hover { transform: scale(1.08); border-color: var(--accent); box-shadow: var(--shadow-sm); }
        .hidden { display: none !important; }
        /* ── Primary Button ── */
        button.primary-btn {
            width: 100%;
            padding: 15px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.01em;
            box-shadow: 0 2px 8px rgba(61,107,255,0.3);
        }
        button.primary-btn:hover { opacity: 0.92; box-shadow: 0 4px 16px rgba(61,107,255,0.4); transform: translateY(-1px); }
        button.primary-btn:active { transform: scale(0.98) translateY(0); }
        /* ── Action links ── */
        .action-link {
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            background: none;
            border: none;
            margin-right: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s;
        }
        .delete-link { color: var(--danger); }
        .delete-link:hover { background: rgba(214,59,47,0.1); }
        .edit-link { color: var(--accent); }
        .edit-link:hover { background: var(--accent-soft); }
        /* ── Footer buttons ── */
        .footer-btn {
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            color: var(--text);
            padding: 13px;
            border-radius: var(--radius-md);
            flex: 1;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }
        .footer-btn:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
        .footer-btn:active { transform: scale(0.98); }
        /* ── Streak ── */
        .streak-dot.filled {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
            box-shadow: 0 0 12px rgba(26,158,92,0.45);
            transform: scale(1.25);
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .celebrate { animation: celebrate-pulse 0.5s infinite alternate; }
        @keyframes celebrate-pulse {
            from { transform: scale(1); }
            to { transform: scale(1.04); }
        }
        /* ── Notes timeline ── */
        #notes-list {
            position: relative;
            padding-left: 20px;
            margin-left: 8px;
            border-left: 2px solid var(--border);
        }
        .time-gap-container {
            position: relative;
            display: flex;
            align-items: center;
            margin: 8px 0;
            left: -30px;
            z-index: 10;
        }
        .duration-badge {
            background: var(--bg);
            color: var(--accent);
            border: 1.5px solid var(--accent-soft);
            font-size: 0.68rem;
            padding: 2px 9px;
            border-radius: 10px;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        .note-item {
            position: relative;
            margin-left: 10px;
            z-index: 5;
        }
        /* ── Modal ── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 9000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        #modal-overlay.visible { display: flex; }
        #modal-box {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px 24px 22px;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.2s ease-out;
            border: 1px solid var(--border);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        #modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 12px; color: var(--text); }
        #modal-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        #modal-textarea:focus { outline: none; border-color: var(--accent); }
        #modal-textarea.hidden { display: none; }
        #modal-message { font-size: 0.92rem; margin-bottom: 16px; color: var(--muted); }
        #modal-message.hidden { display: none; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: opacity 0.2s, transform 0.15s;
        }
        .modal-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .modal-btn-cancel  { background: var(--surface2); color: var(--text); }
        .modal-btn-confirm { background: var(--accent); color: white; }
        .modal-btn-danger  { background: var(--danger); color: white; }
        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 96px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--text);
            color: var(--bg);
            padding: 10px 22px;
            border-radius: 22px;
            font-size: 0.84rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            z-index: 8000;
            white-space: nowrap;
            box-shadow: var(--shadow-md);
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        /* ── Char counter ── */
        #char-counter { font-size: 0.72rem; color: var(--muted); text-align: right; margin-bottom: 12px; }
        #char-counter.warn { color: var(--danger); }
        /* ── AI Summary Box ── */
        #llm-controls {
            margin-bottom: 24px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        .llm-header {
            background: linear-gradient(135deg, #3d6bff 0%, #7b5cff 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .llm-header-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
        }
        #summarize-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.35);
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        #summarize-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
        #summarize-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #llm-status {
            font-size: 0.75rem;
            color: var(--muted);
            padding: 8px 16px 4px;
            text-align: center;
            background: var(--surface2);
            min-height: 0;
        }
        #daily-summary-output {
            background: var(--card-bg);
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }
        #daily-summary-output.has-content {
            padding: 20px;
            max-height: 600px;
        }
        /* Summary structured sections */
        .summary-section { margin-bottom: 18px; }
        .summary-section:last-child { margin-bottom: 0; }
        .summary-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .summary-wins {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .summary-win-item {
            background: rgba(26,158,92,0.08);
            border: 1px solid rgba(26,158,92,0.2);
            border-radius: var(--radius-sm);
            padding: 9px 13px;
            font-size: 0.88rem;
            line-height: 1.5;
            color: var(--text);
        }
        .summary-themes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .summary-theme-chip {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid rgba(61,107,255,0.2);
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .summary-focus-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text);
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
        }
        /* ── Search ── */
        .search-wrapper {
            position: relative;
            margin-bottom: 24px;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0.5;
            pointer-events: none;
        }
        #search-input {
            width: 100%;
            padding: 13px 16px 13px 40px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        #search-input::placeholder { color: var(--muted); }
        /* ── Section headers ── */
        .section-header {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 1.7rem;
            font-weight: 400;
            margin: 0 0 22px 0;
            line-height: 1.2;
        }
        .section-subheader {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        /* ── Focus card ── */
        .focus-card {
            background: var(--card-bg);
            border: 1.5px solid var(--accent);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            margin-bottom: 24px;
            box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-md);
        }
        /* ── Time nudge ── */
        #time-blindness-nudge {
            text-align: center;
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 18px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        /* ── Spinne animation for loading ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        /* ── AI on-device model UI ── */
        .model-picker-row {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
            align-items: center;
            flex-wrap: wrap;
        }
        .model-select {
            flex: 1;
            min-width: 0;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-size: 0.8rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .model-select:focus { outline: none; border-color: var(--accent); }
        .model-dl-note {
            font-size: 0.72rem;
            color: var(--muted);
            width: 100%;
            line-height: 1.4;
            padding: 0 2px;
        }
        /* Download progress bar */
        .dl-progress-wrap {
            padding: 10px 16px 14px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
        }
        .dl-progress-label {
            font-size: 0.74rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        .dl-progress-bar-outer {
            height: 5px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }
        .dl-progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #7b5cff);
            border-radius: 99px;
            width: 0%;
            transition: width 0.3s ease;
        }
        /* Misc */
        small { color: var(--muted); font-size: 0.78rem; }
        mark { background: rgba(61,107,255,0.2); color: var(--accent); border-radius: 3px; padding: 0 2px; }
        .note-actions { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; gap: 4px; }
    </style>
    <!-- Import map: resolves bare specifier used inside Transformers.js v3 -->
    <script type="importmap">
    {

<script type="module">
'use strict';

/* =============================================================================
 * SECURITY LAYER
 *
 * All user content flows through these helpers. No raw user string ever
 * touches innerHTML directly — this eliminates stored XSS entirely.
 * ============================================================================= */

/** Sanitise a note ID. IDs are Date.now() integers; reject everything else. */
function sanitiseId(id) {
    const n = Number(id);
    return Number.isInteger(n) && n > 0 && n <= Number.MAX_SAFE_INTEGER ? n : null;
}

/** Validate & normalise a single note object. Returns null if malformed. */
function validateNote(note) {
    if (!note || typeof note !== 'object' || Array.isArray(note)) return null;
    const id = sanitiseId(note.id);
    if (!id) return null;
    if (typeof note.content !== 'string') return null;
    if (typeof note.timestamp !== 'string' || isNaN(Date.parse(note.timestamp))) return null;
    if (typeof note.dateKey !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(note.dateKey)) return null;
    return {
        id,
        timestamp: note.timestamp,
        content: note.content.slice(0, 5000),
        dateKey: note.dateKey,
        tags: Array.isArray(note.tags)
            ? note.tags.filter(t => typeof t === 'string' && /^#\w+$/.test(t)).slice(0, 20)
            : [],
    };
}

/** Safe JSON.parse — never throws. */
function safeJSON(str, fallback) {
    try { return JSON.parse(str) ?? fallback; } catch { return fallback; }
}

function getLocalNotes() {
    const raw = safeJSON(localStorage.getItem('journal_notes'), []);
    return Array.isArray(raw) ? raw.map(validateNote).filter(Boolean) : [];
}
function setLocalNotes(notes) { localStorage.setItem('journal_notes', JSON.stringify(notes)); }

function getDeletedIds() {
    const raw = safeJSON(localStorage.getItem('journal_deleted_ids'), []);
    return Array.isArray(raw) ? raw.map(sanitiseId).filter(Boolean) : [];
}
function setDeletedIds(ids) { localStorage.setItem('journal_deleted_ids', JSON.stringify(ids)); }

/* =============================================================================
 * CUSTOM MODAL  (replaces prompt() / confirm())
 * ============================================================================= */
const modalOverlay  = document.getElementById('modal-overlay');
const modalTitle    = document.getElementById('modal-title');
const modalMessage  = document.getElementById('modal-message');
const modalTextarea = document.getElementById('modal-textarea');
const modalCancel   = document.getElementById('modal-cancel');
const modalConfirm  = document.getElementById('modal-confirm');
let _modalResolve   = null;

function showModal({ title, message, defaultValue, isDanger = false }) {
    return new Promise(resolve => {
        _modalResolve = resolve;
        modalTitle.textContent = title;
        if (message) { modalMessage.textContent = message; modalMessage.classList.remove('hidden'); }
        else { modalMessage.classList.add('hidden'); }
        if (defaultValue !== undefined) {
            modalTextarea.value = defaultValue;
            modalTextarea.classList.remove('hidden');
            requestAnimationFrame(() => { modalTextarea.focus(); modalTextarea.select(); });
        } else {
            modalTextarea.classList.add('hidden');
        }
        modalConfirm.className = `modal-btn ${isDanger ? 'modal-btn-danger' : 'modal-btn-confirm'}`;
        modalConfirm.textContent = isDanger ? 'Delete' : 'Save';
        modalOverlay.classList.add('visible');
    });
}
function closeModal(result) {
    modalOverlay.classList.remove('visible');
    if (_modalResolve) { _modalResolve(result); _modalResolve = null; }
}
modalConfirm.addEventListener('click', () =>
    closeModal(modalTextarea.classList.contains('hidden') ? true : modalTextarea.value.trim())
);
modalCancel.addEventListener('click', () => closeModal(null));
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(null); });
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modalOverlay.classList.contains('visible')) closeModal(null);
});

/* =============================================================================
 * TOAST
 * ============================================================================= */
const toastEl = document.getElementById('toast');
let _toastTimer = null;
function showToast(msg, ms = 2600) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
}

/* =============================================================================
 * 1. CONFIG & STATE
 * =============================================================================
 * SECURITY NOTE: CLIENT_ID is a public identifier, not a secret. It must be
 * registered in Google Cloud Console with the exact allowed origin. The
 * drive.appdata scope is strictly app-sandboxed — this app cannot read any
 * other file in the user's Drive.
 * ============================================================================= */
const CLIENT_ID = '629370111704-m36nu5qgi52071qgp0sfsbs5sa9ac80k.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/drive.appdata';

let tokenClient = null;
let accessToken = null;   // Lives in memory only, never persisted
let driveFileId = null;
let syncInterval = null;
let isSyncing    = false; // Mutex: prevents concurrent overlapping syncs

let currentMonth = new Date();
const noteInput  = document.getElementById('note-input');
const charCounter = document.getElementById('char-counter');

const getISODate = d => {
    const dt = new Date(d);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
};

/* =============================================================================
 * 2. GOOGLE DRIVE SYNC
 * ============================================================================= */
function initGIS() {
    if (!window.google?.accounts) { setTimeout(initGIS, 500); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (response) => {
            if (response.error) { updateSyncUI('❌', 'Auth Error'); return; }
            accessToken = response.access_token;
            // Clear token before it expires (~1 h for Google OAuth tokens)
            setTimeout(() => { accessToken = null; }, 55 * 60 * 1000);
            await syncWithDrive();
            startPeriodicSync();
        },
    });
    // Silently restore session for returning users — no interaction required
    if (localStorage.getItem('auto_sync_enabled') === 'true') {
        tokenClient.requestAccessToken({ prompt: '' });
    }
}

function startPeriodicSync() {
    if (syncInterval) return;
    syncInterval = setInterval(async () => {
        if (accessToken && !isSyncing) await syncWithDrive(true);
    }, 3 * 60 * 1000);
}

async function handleAuthClick() {
    if (!tokenClient) { showToast('Google Sign-In not ready yet'); return; }
    if (!accessToken) {
        const hadPrior = localStorage.getItem('auto_sync_enabled') === 'true';
        tokenClient.requestAccessToken({ prompt: hadPrior ? '' : 'select_account' });
    } else {
        await syncWithDrive();
    }
}

function updateSyncUI(icon, text) {
    document.getElementById('sync-icon').textContent = icon;
    document.getElementById('sync-text').textContent = text;
}

/**
 * Thin fetch wrapper that enforces googleapis.com as the only allowed host.
 * SECURITY: Prevents token leakage if a URL were ever constructed from
 * user-controlled data (defence in depth).
 */
async function apiFetch(url, method = 'GET', body, extraHeaders = {}) {
    const { hostname } = new URL(url);
    if (!hostname.endsWith('googleapis.com')) throw new Error(`Blocked: ${hostname}`);
    return fetch(url, {
        method,
        headers: { Authorization: `Bearer ${accessToken}`, ...extraHeaders },
        ...(body !== undefined && { body }),
    });
}

async function syncWithDrive(silent = false) {
    if (isSyncing) return;
    isSyncing = true;
    try {
        if (!silent) updateSyncUI('⏳', 'Syncing…');

        // List files sorted newest-first; fields param minimises payload
        const listRes = await apiFetch(
            `https://www.googleapis.com/drive/v3/files?q=name%3D'journal_data.json'&spaces=appDataFolder&fields=files(id%2CmodifiedTime)&orderBy=modifiedTime+desc`
        );
        if (!listRes.ok) throw new Error(`Drive list: ${listRes.status}`);
        const { files } = await listRes.json();

        // Purge duplicate files left by the old single-device bug
        if (Array.isArray(files) && files.length > 1) {
            await Promise.all(
                files.slice(1).map(f =>
                    apiFetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(f.id)}`, 'DELETE')
                )
            );
        }

        if (Array.isArray(files) && files.length > 0) {
            driveFileId = files[0].id;
            const fileRes = await apiFetch(
                `https://www.googleapis.com/drive/v3/files/${encodeURIComponent(driveFileId)}?alt=media`
            );
            if (fileRes.ok) {
                const driveData = await fileRes.json();
                mergeNotes(driveData); // validation happens inside mergeNotes
            }
        }

        await uploadToDrive();
        localStorage.setItem('auto_sync_enabled', 'true');
        if (!silent) {
            updateSyncUI('✅', 'Synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
            showToast('✅ Synced with Google Drive');
        }
    } catch (err) {
        console.error('Sync error:', err);
        if (!silent) updateSyncUI('❌', 'Sync Error');
    } finally {
        isSyncing = false;
    }
}

async function uploadToDrive() {
    if (!accessToken) return;

    // Avoid creating a duplicate file when driveFileId is unknown
    if (!driveFileId) {
        const checkRes = await apiFetch(
            `https://www.googleapis.com/drive/v3/files?q=name%3D'journal_data.json'&spaces=appDataFolder&fields=files(id)`
        );
        if (checkRes.ok) {
            const { files } = await checkRes.json();
            if (Array.isArray(files) && files.length > 0) driveFileId = files[0].id;
        }
    }

    const payload  = JSON.stringify({ notes: getLocalNotes(), deletedIds: getDeletedIds() });
    const metadata = driveFileId ? {} : { name: 'journal_data.json', parents: ['appDataFolder'] };
    const boundary = 'journal_sync_v1';
    const body =
        `\r\n--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` + JSON.stringify(metadata) +
        `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` + payload +
        `\r\n--${boundary}--`;

    const url = driveFileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${encodeURIComponent(driveFileId)}?uploadType=multipart`
        : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

    const res = await apiFetch(url, driveFileId ? 'PATCH' : 'POST', body, {
        'Content-Type': `multipart/related; boundary=${boundary}`,
    });
    if (!driveFileId && res.ok) driveFileId = (await res.json()).id;
}

function mergeNotes(driveData) {
    // Backwards-compatible with the old plain-array format
    const rawDriveNotes   = Array.isArray(driveData) ? driveData : (driveData?.notes ?? []);
    const rawDriveDeleted = Array.isArray(driveData) ? [] : (driveData?.deletedIds ?? []);

    // SECURITY: validate every note arriving from Drive before touching localStorage
    const driveNotes   = rawDriveNotes.map(validateNote).filter(Boolean);
    const driveDeleted = rawDriveDeleted.map(sanitiseId).filter(Boolean);

    const localNotes   = getLocalNotes();
    const localDeleted = getDeletedIds();
    const allDeleted   = new Set([...localDeleted, ...driveDeleted]);

    // Last-writer-wins merge
    const merged = new Map();
    [...localNotes, ...driveNotes].forEach(n => {
        const ex = merged.get(n.id);
        if (!ex || new Date(n.timestamp) > new Date(ex.timestamp)) merged.set(n.id, n);
    });
    allDeleted.forEach(id => merged.delete(id));

    setLocalNotes(Array.from(merged.values()));
    setDeletedIds(Array.from(allDeleted));

    const titleEl = document.getElementById('selected-date-title');
    if (titleEl.textContent.startsWith('Notes for ')) {
        showNotesForDay(titleEl.textContent.replace('Notes for ', '').trim());
    }
    renderAll();
}

/* =============================================================================
 * 3. ADHD FEATURES
 * ============================================================================= */
function updateStreakUI() {
    const streak = Math.min(parseInt(localStorage.getItem('focus_streak') || '0', 10), 100);
    document.querySelectorAll('.streak-dot').forEach((dot, i) =>
        dot.classList.toggle('filled', i < streak)
    );
    const msg = document.getElementById('streak-message');
    if (streak >= 3) {
        msg.textContent = '🌟 Dopamine Hit! 3 in a row!';
        msg.classList.remove('hidden');
        document.getElementById('focus-section').classList.add('celebrate');
        setTimeout(() => {
            localStorage.setItem('focus_streak', '0');
            msg.classList.add('hidden');
            document.getElementById('focus-section').classList.remove('celebrate');
            updateStreakUI();
        }, 5000);
    }
}

function updateLiveTimer() {
    const nudge = document.getElementById('time-blindness-nudge');
    const notes = getLocalNotes();
    if (notes.length > 0) {
        const last = notes.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
        const mins = Math.floor((Date.now() - new Date(last.timestamp)) / 60000);
        nudge.textContent = mins < 1 ? '✨ Just logged.' : `⏳ ${mins}m since last entry.`;
    }
    const focusStart = localStorage.getItem('focus_start_time');
    if (focusStart) {
        document.getElementById('focus-timer').textContent =
            `${Math.floor((Date.now() - new Date(focusStart)) / 60000)}m`;
    }
}

async function startFocus() {
    const text = noteInput.value.trim();
    if (!text) { showToast('Enter a focus goal first'); return; }
    // SECURITY: store raw text; rendered via textContent not innerHTML
    localStorage.setItem('current_focus', text.slice(0, 200));
    localStorage.setItem('focus_start_time', new Date().toISOString());
    noteInput.value = '';
    charCounter.textContent = '0 / 5000';
    charCounter.classList.remove('warn');
    renderFocus();
    updateLiveTimer();
}

async function completeFocus() {
    const text  = localStorage.getItem('current_focus');
    const start = localStorage.getItem('focus_start_time');
    if (!text || !start) return;
    const dur = Math.floor((Date.now() - new Date(start)) / 60000);
    await saveNote(`✅ Finished: ${text} (#focus for ${dur}m)`);
    const streak = parseInt(localStorage.getItem('focus_streak') || '0', 10);
    localStorage.setItem('focus_streak', String(streak + 1));
    localStorage.removeItem('current_focus');
    localStorage.removeItem('focus_start_time');
    renderFocus();
    updateStreakUI();
}

function renderFocus() {
    const text = localStorage.getItem('current_focus');
    const section = document.getElementById('focus-section');
    if (text) {
        section.classList.remove('hidden');
        // SECURITY: textContent — user data never goes into innerHTML
        document.getElementById('focus-text').textContent = text;
    } else {
        section.classList.add('hidden');
    }
}

/* =============================================================================
 * 4. CRUD
 * ============================================================================= */
async function saveNote(manualText = null) {
    const text = manualText || noteInput.value.trim();
    if (!text) return;
    if (text.length > 5000) { showToast('Note too long (max 5000 chars)'); return; }

    const newNote = validateNote({
        id: Date.now(),
        timestamp: new Date().toISOString(),
        content: text,
        dateKey: getISODate(new Date()),
        tags: (text.match(/#(\w+)/g) || []).map(t => t.toLowerCase()),
    });
    if (!newNote) return;

    const notes = getLocalNotes();
    notes.push(newNote);
    setLocalNotes(notes);

    if (!manualText) {
        noteInput.value = '';
        charCounter.textContent = '0 / 5000';
        charCounter.classList.remove('warn');
    }
    updateLiveTimer();
    if (accessToken) await uploadToDrive();
    showToast('Note saved ✓');
}

async function editNote(id) {
    const safeId = sanitiseId(id);
    if (!safeId) return;
    const notes = getLocalNotes();
    const idx   = notes.findIndex(n => n.id === safeId);
    if (idx === -1) return;

    // SECURITY: custom modal — no prompt()
    const newText = await showModal({ title: 'Edit Note', defaultValue: notes[idx].content });
    if (!newText || typeof newText !== 'string' || !newText.trim()) return;
    if (newText.length > 5000) { showToast('Note too long (max 5000 chars)'); return; }

    notes[idx].content   = newText.trim();
    notes[idx].timestamp = new Date().toISOString();
    notes[idx].tags      = (newText.match(/#(\w+)/g) || []).map(t => t.toLowerCase());
    setLocalNotes(notes);
    showNotesForDay(notes[idx].dateKey);
    if (accessToken) await uploadToDrive();
}

async function deleteNote(id) {
    const safeId = sanitiseId(id);
    if (!safeId) return;

    // SECURITY: custom modal — no confirm()
    const confirmed = await showModal({
        title: 'Delete Note',
        message: 'Delete this entry permanently? This cannot be undone.',
        isDanger: true,
    });
    if (!confirmed) return;

    const notes = getLocalNotes().filter(n => n.id !== safeId);
    setLocalNotes(notes);

    // Tombstone so other devices honour this deletion on next sync
    const deleted = getDeletedIds();
    if (!deleted.includes(safeId)) deleted.push(safeId);
    setDeletedIds(deleted);

    renderAll();
    document.getElementById('notes-list').innerHTML = '';
    document.getElementById('selected-date-title').textContent = '';
    document.getElementById('llm-controls').style.display = 'none';
    if (accessToken) await uploadToDrive();
    showToast('Note deleted');
}

function toggleDarkMode() {
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('dark_mode', String(isDark));
    document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
}

/* =============================================================================
 * 5. CALENDAR & HISTORY
 * ============================================================================= */
function formatDuration(ms) {
    const m = Math.floor(ms / 60000);
    return m < 1 ? '< 1m' : m < 60 ? `${m}m` : `${Math.floor(m/60)}h ${m%60}m`;
}

function renderCalendar() {
    const cal   = document.getElementById('calendar');
    const month = currentMonth.getMonth();
    const year  = currentMonth.getFullYear();
    cal.innerHTML = '';
    document.getElementById('month-display').textContent =
        new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentMonth);

    const counts = getLocalNotes().reduce((acc, n) => {
        acc[n.dateKey] = (acc[n.dateKey] || 0) + 1; return acc;
    }, {});

    const firstDay    = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) cal.appendChild(document.createElement('div'));
    for (let d = 1; d <= daysInMonth; d++) {
        const key   = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const count = counts[key] || 0;
        const btn   = document.createElement('button');
        btn.type = 'button';
        btn.className = `calendar-day${count > 0 ? ' lvl-' + Math.min(Math.ceil(count/2), 4) : ''}`;
        btn.textContent = d;
        btn.setAttribute('aria-label', `${key}${count > 0 ? `, ${count} note${count > 1 ? 's' : ''}` : ''}`);
        btn.addEventListener('click', () => showNotesForDay(key));
        cal.appendChild(btn);
    }
}

function showNotesForDay(dateKey) {
    // Validate format to prevent injection via crafted dateKey
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) return;

    const list     = document.getElementById('notes-list');
    const notes    = getLocalNotes();
    const filtered = notes
        .filter(n => n.dateKey === dateKey)
        .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

    // SECURITY: textContent — never innerHTML for dynamic values
    document.getElementById('selected-date-title').textContent = `Notes for ${dateKey}`;
    list.innerHTML = '';

    if (filtered.length === 0) {
        const p = document.createElement('p');
        p.textContent = 'No entries.';
        list.appendChild(p);
    } else {
        filtered.forEach((n, i) => {
            if (i > 0) {
                const gap = document.createElement('div');
                gap.className = 'time-gap-container';
                const badge = document.createElement('div');
                badge.className = 'duration-badge';
                badge.textContent = `⏱️ ${formatDuration(new Date(n.timestamp) - new Date(filtered[i-1].timestamp))} gap`;
                gap.appendChild(badge);
                list.appendChild(gap);
            }

            const card = document.createElement('div');
            card.className = 'note-item';

            const time = document.createElement('small');
            time.textContent = new Date(n.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

            // SECURITY: split on newlines and use text nodes — never innerHTML
            const contentDiv = document.createElement('div');
            contentDiv.style.cssText = 'margin:10px 0;font-size:1.05rem;';
            n.content.split('\n').forEach((line, li) => {
                if (li > 0) contentDiv.appendChild(document.createElement('br'));
                contentDiv.appendChild(document.createTextNode(line));
            });

            const actions = document.createElement('div');
            actions.className = 'note-actions';

            const editBtn = document.createElement('button');
            editBtn.className = 'action-link edit-link';
            editBtn.textContent = 'Edit';
            editBtn.addEventListener('click', () => editNote(n.id));

            const delBtn = document.createElement('button');
            delBtn.className = 'action-link delete-link';
            delBtn.textContent = 'Delete';
            delBtn.addEventListener('click', () => deleteNote(n.id));

            actions.append(editBtn, delBtn);
            card.append(time, contentDiv, actions);
            list.appendChild(card);
        });
    }

    document.getElementById('llm-controls').style.display = filtered.length > 0 ? 'block' : 'none';
    renderCalendar();
}

/* =============================================================================
 * 6. AI SUMMARY — 100% On-Device via Transformers.js v3
 *
 * Works on localhost AND GitHub Pages.
 *
 * The importmap in <head> maps '@huggingface/transformers' to the jsDelivr
 * CDN URL, so `import { pipeline, env }` resolves correctly at runtime.
 * The script tag is type="module" so the import() works.
 *
 * env.backends.onnx.wasm.wasmPaths tells ORT where to find its .wasm files
 * (same CDN dist/ folder) — without this it looks at the page origin → 404.
 *
 * yieldToMain() yields between heavy steps so the browser stays responsive.
 * ============================================================================= */

let _pipeline    = null;
let _loadedModel = null;

/** Yield to the browser — prevents "Page Unresponsive" during heavy work. */
function yieldToMain() {
    if (typeof scheduler !== 'undefined' && scheduler.yield) return scheduler.yield();
    return new Promise(function(r) { setTimeout(r, 0); });
}

async function loadModel(modelId, onProgress) {
    if (_pipeline && _loadedModel === modelId) return _pipeline;

    // importmap resolves this to the full CDN URL
    const { pipeline, env } = await import('@huggingface/transformers');

    // Tell ORT where its own WASM runtime files are — same CDN, same version.
    // Without this it tries to load ort-wasm*.wasm from the page origin → 404.
    env.backends.onnx.wasm.wasmPaths =
        'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3/dist/';
    env.allowRemoteModels = true;
    env.allowLocalModels  = false;
    env.useBrowserCache   = true;

    await yieldToMain();

    // Try WebGPU (fast GPU), fall back to wasm (universal CPU)
    for (const [device, dtype] of [['webgpu', 'q4'], ['wasm', 'q4']]) {
        try {
            if (device === 'wasm') {
                onProgress({ _msg: 'No GPU — switching to CPU (1-2 min first time)...' });
                await yieldToMain();
            }
            _pipeline = await pipeline('text-generation', modelId, {
                dtype,
                device,
                progress_callback: onProgress,
            });
            _loadedModel = modelId;
            return _pipeline;
        } catch (err) {
            console.warn('device=' + device + ' failed:', err.message);
            if (device === 'wasm') throw err;
        }
    }
}

/* ── UI helpers ─────────────────────────────────────────────────────────────── */
function setDlProgress(text, pct) {
    const wrap  = document.getElementById('dl-progress-wrap');
    const bar   = document.getElementById('dl-progress-bar');
    const label = document.getElementById('dl-progress-text');
    const pctEl = document.getElementById('dl-progress-pct');
    wrap.style.display = 'block';
    label.textContent  = text;
    if (pct != null) { bar.style.width = pct + '%';  pctEl.textContent = pct + '%'; }
    else             { bar.style.width = '100%';      pctEl.textContent = '...'; }
}

function hideDlProgress() {
    document.getElementById('dl-progress-wrap').style.display = 'none';
}

function onModelProgress(p) {
    if (p._msg)                                             { setDlProgress(p._msg, null);           return; }
    if (p.status === 'initiate')                            { setDlProgress('Starting...', 0);       return; }
    if (p.status === 'progress' || p.status === 'download') {
        const pct  = p.total > 0 ? Math.round(p.loaded / p.total * 100) : null;
        const name = p.file ? p.file.split('/').pop() : 'model';
        setDlProgress('Downloading ' + name + '...', pct);
        return;
    }
    if (p.status === 'done')    { setDlProgress('Almost ready...', null);        return; }
    if (p.status === 'loading') { setDlProgress('Loading into memory...', null); }
}

/* ── Main entry point ───────────────────────────────────────────────────────── */
async function generateDailySummary() {
    const btn     = document.getElementById('summarize-btn');
    const status  = document.getElementById('llm-status');
    const output  = document.getElementById('daily-summary-output');
    const modelId = document.getElementById('model-select').value;

    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span> Working...';
    status.textContent = '';
    output.classList.remove('has-content');
    output.innerHTML = '';

    // Collect notes safely — textContent only, no XSS risk
    const noteCards = Array.from(document.querySelectorAll('#notes-list .note-item'));
    const noteTexts = noteCards.map(function(card) {
        const time = card.querySelector('small') ? card.querySelector('small').textContent : '';
        const body = card.querySelector('div')   ? card.querySelector('div').textContent   : '';
        return '[' + time + '] ' + body.trim();
    }).filter(Boolean);

    if (noteTexts.length === 0) {
        status.textContent = 'No notes found for this day.';
        btn.disabled = false; btn.textContent = 'Summarize';
        return;
    }

    try {
        setDlProgress('Loading model...', 0);
        await yieldToMain();

        const gen = await loadModel(modelId, onModelProgress);
        hideDlProgress();
        status.textContent = 'Generating summary...';
        await yieldToMain();

        const noteCount = noteTexts.length;
        const joined    = noteTexts.map(function(t, i) { return (i + 1) + '. ' + t; }).join('\n');
        const truncated = joined.length > 1000 ? joined.slice(0, 1000) + '...' : joined;

        // Three focused prompts — much more reliable on small models than JSON
        async function ask(question, maxTokens) {
            await yieldToMain();
            const prompt = 'Notes from today:\n' + truncated +
                           '\n\nQuestion: ' + question + '\nAnswer:';
            return gen(prompt, {
                max_new_tokens:     maxTokens,
                temperature:        0.1,
                repetition_penalty: 1.4,
                do_sample:          false,
                return_full_text:   false,
            });
        }

        function getText(out) {
            const gt  = out && out[0] && out[0].generated_text;
            const raw = (Array.isArray(gt)
                ? ((gt[gt.length - 1] && gt[gt.length - 1].content) || '')
                : (typeof gt === 'string' ? gt : '')
            ).trim();
            return raw.split(/\n\s*\n/)[0].trim().slice(0, 350);
        }

        const winsOut   = await ask('What tasks or goals were completed today? List each on its own line, no bullets, max 4 items:', 90);
        const themesOut = await ask('What are 2-4 one-word topic tags for today? Comma-separated only:', 30);
        const reflOut   = await ask('In one sentence, what was the overall mood or progress of this day?', 60);

        const wins = getText(winsOut)
            .split('\n')
            .map(function(s) { return s.replace(/^[\s\d.\-*]+/, '').trim(); })
            .filter(function(s) { return s.length > 3 && s.length < 120; })
            .slice(0, 4);

        const themes = getText(themesOut)
            .split(/,|\n/)
            .map(function(s) { return s.replace(/[#.'"[\]\d]/g, '').trim().toLowerCase(); })
            .filter(function(s) { return s.length > 1 && s.length < 25; })
            .slice(0, 5);

        const reflection = getText(reflOut);

        renderSummary({ wins: wins, themes: themes, reflection: reflection, note_count: noteCount }, output);
        status.textContent = '';

    } catch (err) {
        hideDlProgress();
        status.textContent = 'Error: ' + (err.message || String(err));
        console.error('AI summary error:', err);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Summarize';
    }
}

/* ── Render ─────────────────────────────────────────────────────────────────── */
function renderSummary(data, container) {
    container.innerHTML = '';
    container.classList.add('has-content');

    function makeSection(emoji, label, buildFn) {
        const sec = document.createElement('div'); sec.className = 'summary-section';
        const lbl = document.createElement('div'); lbl.className = 'summary-label';
        lbl.textContent = emoji + '  ' + label;
        sec.appendChild(lbl); buildFn(sec); container.appendChild(sec);
    }

    function toStr(v) {
        if (typeof v === 'string') return v.trim();
        if (v && typeof v === 'object') return String(Object.values(v)[0] || '').trim();
        return '';
    }

    const wins = (Array.isArray(data.wins) ? data.wins : []).map(toStr).filter(function(s) { return s.length > 2; });
    if (wins.length) {
        makeSection('\u{1F3C6}', 'Wins', function(sec) {
            const wrap = document.createElement('div'); wrap.className = 'summary-wins';
            wins.forEach(function(w) {
                const el = document.createElement('div'); el.className = 'summary-win-item';
                el.textContent = w.slice(0, 150); wrap.appendChild(el);
            });
            sec.appendChild(wrap);
        });
    }

    const themes = (Array.isArray(data.themes) ? data.themes : []).map(toStr).filter(function(s) { return s.length > 1; });
    if (themes.length) {
        makeSection('\u{1F5C2}', 'Themes', function(sec) {
            const wrap = document.createElement('div'); wrap.className = 'summary-themes';
            themes.forEach(function(t) {
                const chip = document.createElement('span'); chip.className = 'summary-theme-chip';
                chip.textContent = t.slice(0, 25); wrap.appendChild(chip);
            });
            sec.appendChild(wrap);
        });
    }

    const refl = typeof data.reflection === 'string' ? data.reflection.trim() : '';
    if (refl) {
        makeSection('\u{1F4AD}', 'Reflection', function(sec) {
            const el = document.createElement('div'); el.className = 'summary-focus-text';
            el.textContent = refl.slice(0, 400); sec.appendChild(el);
        });
    }

    const foot = document.createElement('div');
    foot.style.cssText = 'font-size:0.72rem;color:var(--muted);margin-top:14px;text-align:right;';
    const nc = Number.isFinite(Number(data.note_count)) ? Number(data.note_count) : '?';
    foot.textContent = 'Based on ' + nc + ' note' + (nc !== 1 ? 's' : '') + ' \u00b7 100% on-device';
    container.appendChild(foot);
}


/* =============================================================================
 * 7. SEARCH & TAGS
 * ============================================================================= */
function searchNotes() {
    const rawQuery = document.getElementById('search-input').value.slice(0, 200);
    const query    = rawQuery.toLowerCase();
    const list     = document.getElementById('notes-list');
    const cal      = document.getElementById('calendar');
    const title    = document.getElementById('selected-date-title');

    if (!query) {
        cal.style.display = 'grid'; list.innerHTML = ''; title.textContent = ''; return;
    }
    cal.style.display = 'none';
    title.textContent = `Search: "${rawQuery.slice(0, 50)}"`;

    const filtered = getLocalNotes()
        .filter(n => n.content.toLowerCase().includes(query))
        .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

    list.innerHTML = '';
    filtered.forEach(n => {
        const card = document.createElement('div');
        card.className = 'note-item';
        const dateEl = document.createElement('small');
        dateEl.textContent = n.dateKey;

        // SECURITY: Highlight via DOM manipulation, not string replace + innerHTML
        const contentDiv = document.createElement('div');
        const lower      = n.content.toLowerCase();
        let last = 0, pos;
        while ((pos = lower.indexOf(query, last)) !== -1) {
            if (pos > last) contentDiv.appendChild(document.createTextNode(n.content.slice(last, pos)));
            const mark = document.createElement('mark');
            mark.textContent = n.content.slice(pos, pos + query.length);
            contentDiv.appendChild(mark);
            last = pos + query.length;
        }
        if (last < n.content.length) contentDiv.appendChild(document.createTextNode(n.content.slice(last)));

        card.append(dateEl, contentDiv);
        list.appendChild(card);
    });
    if (filtered.length === 0) {
        const p = document.createElement('p'); p.textContent = 'No notes match your search.'; list.appendChild(p);
    }
}

function renderTagCloud() {
    const cloud = document.getElementById('tag-cloud');
    const tags  = [...new Set(getLocalNotes().flatMap(n => n.tags || []))];
    cloud.innerHTML = '';
    tags.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'tag';
        btn.textContent = t; // tags are pre-validated as /^#\w+$/
        btn.addEventListener('click', () => filterByTag(t));
        cloud.appendChild(btn);
    });
}

function filterByTag(tag) {
    if (!/^#\w+$/.test(tag)) return; // SECURITY: re-validate
    const notes = getLocalNotes().filter(n => n.tags.includes(tag));
    document.getElementById('calendar').style.display = 'none';
    document.getElementById('selected-date-title').textContent = `Tag: ${tag}`;
    const list = document.getElementById('notes-list');
    list.innerHTML = '';
    notes.forEach(n => {
        const card = document.createElement('div');
        card.className = 'note-item';
        const dateEl = document.createElement('small'); dateEl.textContent = n.dateKey;
        const body   = document.createElement('div');   body.textContent   = n.content;
        card.append(dateEl, body);
        list.appendChild(card);
    });
}

/* =============================================================================
 * 8. NAVIGATION & UTILITIES
 * ============================================================================= */
function showPage(pageId) {
    if (!['home-page', 'history-page'].includes(pageId)) return;
    document.getElementById('home-page').classList.toggle('hidden', pageId !== 'home-page');
    document.getElementById('history-page').classList.toggle('hidden', pageId !== 'history-page');
    document.getElementById('nav-write').classList.toggle('active', pageId === 'home-page');
    document.getElementById('nav-history').classList.toggle('active', pageId === 'history-page');
    if (pageId === 'history-page') {
        renderAll();
        document.getElementById('notes-list').innerHTML = '';
        document.getElementById('calendar').style.display = 'grid';
    }
}

function renderAll() { renderTagCloud(); renderCalendar(); }
function changeMonth(dir) { currentMonth.setMonth(currentMonth.getMonth() + dir); renderCalendar(); }

function exportNotes() {
    const blob = new Blob([JSON.stringify(getLocalNotes(), null, 2)], { type: 'application/json' });
    const a    = Object.assign(document.createElement('a'), {
        href:     URL.createObjectURL(blob),
        download: `journal-${getISODate(new Date())}.json`,
    });
    a.click();
    URL.revokeObjectURL(a.href);
}

function importNotes(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 1_000_000) { showToast('File too large (max 1 MB)'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
        const parsed = safeJSON(ev.target.result, null);
        if (!Array.isArray(parsed)) { showToast('Invalid journal file'); return; }
        const valid = parsed.map(validateNote).filter(Boolean);
        if (valid.length === 0) { showToast('No valid notes found'); return; }
        setLocalNotes(valid);
        renderAll();
        showToast(`Imported ${valid.length} notes ✓`);
        e.target.value = ''; // Reset so same file can be re-imported
    };
    reader.readAsText(file);
}

/* =============================================================================
 * 9. EVENT WIRING
 * All handlers via addEventListener — no inline onclick attributes.
 * This keeps the CSP tight and avoids global namespace pollution.
 * ============================================================================= */
document.getElementById('save-btn').addEventListener('click', () => saveNote());
document.getElementById('focus-btn').addEventListener('click', startFocus);
document.getElementById('complete-focus-btn').addEventListener('click', completeFocus);
document.getElementById('nav-write').addEventListener('click', () => showPage('home-page'));
document.getElementById('nav-history').addEventListener('click', () => showPage('history-page'));
document.getElementById('nav-sync').addEventListener('click', handleAuthClick);
document.getElementById('nav-theme').addEventListener('click', toggleDarkMode);
document.getElementById('prev-month-btn').addEventListener('click', () => changeMonth(-1));
document.getElementById('next-month-btn').addEventListener('click', () => changeMonth(1));
document.getElementById('export-btn').addEventListener('click', exportNotes);
document.getElementById('import-file').addEventListener('change', importNotes);
document.getElementById('search-input').addEventListener('input', searchNotes);
document.getElementById('summarize-btn').addEventListener('click', generateDailySummary);

// Update size note when model selection changes
// Update size note when model selection changes
document.getElementById('model-select').addEventListener('change', function() {
    const opt  = this.options[this.selectedIndex];
    const size = opt.getAttribute('data-size') || '';
    document.getElementById('model-dl-note').textContent =
        `⬇️ ${size} download once, then runs offline forever.`;
    // Reset cached pipeline so new model loads on next click
    _pipeline = null;
    _loadedModel = null;
    document.getElementById('daily-summary-output').innerHTML = '';
    document.getElementById('daily-summary-output').classList.remove('has-content');
    document.getElementById('llm-status').textContent = '';
    hideDlProgress();
});

// Live character counter
noteInput.addEventListener('input', () => {
    const len = noteInput.value.length;
    charCounter.textContent = `${len} / 5000`;
    charCounter.classList.toggle('warn', len >= 4500);
});

// Keyboard shortcut: Ctrl/Cmd + Enter to save
noteInput.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveNote();
});

/* =============================================================================
 * 10. INIT
 * ============================================================================= */
window.addEventListener('load', initGIS);

(function init() {
    renderFocus();
    updateLiveTimer();
    updateStreakUI();
    setInterval(updateLiveTimer, 30000);

    // Dark mode: default dark; respect explicit saved preference
    const saved  = localStorage.getItem('dark_mode');
    const isDark = saved === null ? true : saved !== 'false';
    document.body.classList.toggle('dark-mode', isDark);
    document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/InterstitialJournal/sw.js')
            .then(reg => {
                reg.onupdatefound = () => {
                    const sw = reg.installing;
                    sw.onstatechange = () => {
                        if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                            showToast('Update available — refresh to apply', 5000);
                        }
                    };
                };
            })
            .catch(err => console.error('SW registration failed:', err));
    }
})();
</script>
