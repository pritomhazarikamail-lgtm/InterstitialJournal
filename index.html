<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!--
        SECURITY: Content Security Policy
        - script-src: only our own origin + the two trusted Google scripts needed for OAuth.
          'unsafe-inline' is intentionally absent; all JS lives in this file under type="module".
          NOTE: GitHub Pages serves this as text/html so a <meta> CSP is the only option.
        - connect-src: googleapis only — blocks data exfiltration to unknown hosts.
        - object-src / base-uri: locked to 'none' to prevent plugin injection & base-tag hijacking.
        - img-src: self + data URIs (icons).
        - frame-ancestors: 'none' — prevents click-jacking.
        - style-src: 'unsafe-inline' is required because all CSS is inline in this single-file app.
    -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        script-src 'self' https://accounts.google.com/gsi/client
                   https://cdn.jsdelivr.net https://esm.run https://esm.sh
                   'unsafe-inline' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        connect-src https://www.googleapis.com https://accounts.google.com
                    https://cdn.jsdelivr.net
                    https://esm.run https://esm.sh
                    https://raw.githubusercontent.com
                    https://huggingface.co https://*.huggingface.co
                    https://hf.co https://*.hf.co;
        img-src 'self' data:;
        font-src 'none' https://fonts.gstatic.com;
        object-src 'none';
        base-uri 'none';
        frame-ancestors 'none';
        form-action 'none';
    ">
    <!-- SECURITY: Prevent browsers from sniffing MIME types -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- SECURITY: No referrer leakage to external origins -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Interstitial Journal</title>

    <!-- PWA / home-screen install hints -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Journal">
    <!-- theme-color: dark default; a light value is set dynamically via JS -->
    <meta name="theme-color" id="theme-color-meta" content="#111010">
    <link rel="manifest" href="manifest.json">
    <!-- Apple touch icons at common sizes for best quality on all devices -->
    <link rel="apple-touch-icon" sizes="180x180" href="journal_icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="journal_icon.png">
    <link rel="apple-touch-icon" sizes="120x120" href="journal_icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f4f0;
            --text: #1a1814;
            --accent: #3d6bff;
            --accent-soft: rgba(61,107,255,0.12);
            --secondary: #ffffff;
            --border: #e2e0db;
            --card-bg: #ffffff;
            --success: #1a9e5c;
            --danger: #d63b2f;
            --muted: #7a7670;
            --surface2: #f0ede8;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
        }
        body.dark-mode {
            --bg: #111010;
            --text: #f0ede8;
            --accent: #5b84ff;
            --accent-soft: rgba(91,132,255,0.15);
            --secondary: #1e1d1c;
            --border: #2a2825;
            --card-bg: #1a1917;
            --muted: #857f78;
            --surface2: #1e1d1c;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 88px;
            min-height: 100dvh;
        }
        .container {
            width: 100%;
            max-width: 520px;
            padding-top: max(24px, env(safe-area-inset-top));
            padding-left: 20px;
            padding-right: 20px;
        }
        /* ── Bottom Nav ── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            z-index: 1000;
            box-shadow: 0 -1px 0 var(--border), 0 -8px 24px rgba(0,0,0,0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .nav-item {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            transition: color 0.2s, background 0.2s;
            letter-spacing: 0.02em;
        }
        .nav-item .nav-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.2s, transform 0.15s;
            font-size: 1.1rem;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item.active .nav-icon { background: var(--accent-soft); transform: scale(1.1); }
        /* ── Cards ── */
        .note-item {
            background: var(--card-bg);
            padding: 18px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 4px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            animation: slideUp 0.25s ease-out both;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .note-item:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ── Textarea ── */
        textarea {
            width: 100%;
            height: 180px;
            padding: 18px 20px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            resize: none;
            outline: none;
            background: var(--card-bg);
            color: var(--text);
            box-shadow: var(--shadow-sm);
            margin-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.7;
        }
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-sm);
        }
        textarea::placeholder { color: var(--muted); opacity: 0.7; }
        /* ── Tags ── */
        .tag {
            background: var(--surface2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid var(--border);
            /* No margin — gap on the flex container handles spacing uniformly */
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            color: var(--accent);
            transition: background 0.2s, transform 0.15s;
            letter-spacing: 0.01em;
        }
        .tag:hover { background: var(--accent-soft); transform: translateY(-1px); }
        .tag--active {
            background: var(--accent) !important;
            color: white !important;
            border-color: var(--accent) !important;
        }
        /* ── Calendar ── */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 28px; }
        .calendar-day {
            aspect-ratio: 1;
            border-radius: 9px;
            cursor: pointer;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.15s ease;
            border: 1.5px solid transparent;
            background: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .calendar-day.lvl-1 { background-color: rgba(61,107,255,0.12); color: var(--accent); }
        .calendar-day.lvl-2 { background-color: rgba(61,107,255,0.28); color: var(--accent); font-weight: 700; }
        .calendar-day.lvl-3 { background-color: rgba(61,107,255,0.55); color: white; font-weight: 700; }
        .calendar-day.lvl-4 { background-color: var(--accent); color: white; font-weight: 700; box-shadow: 0 2px 8px rgba(61,107,255,0.35); }
        .calendar-day:hover { transform: scale(1.08); border-color: var(--accent); box-shadow: var(--shadow-sm); }
        .hidden { display: none !important; }
        /* ── Primary Button ── */
        button.primary-btn {
            width: 100%;
            padding: 15px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.01em;
            box-shadow: 0 2px 8px rgba(61,107,255,0.3);
        }
        button.primary-btn:hover { opacity: 0.92; box-shadow: 0 4px 16px rgba(61,107,255,0.4); transform: translateY(-1px); }
        button.primary-btn:active { transform: scale(0.98) translateY(0); }
        /* ── Action links ── */
        .action-link {
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            background: none;
            border: none;
            margin-right: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s;
        }
        .delete-link { color: var(--danger); }
        .delete-link:hover { background: rgba(214,59,47,0.1); }
        .edit-link { color: var(--accent); }
        .edit-link:hover { background: var(--accent-soft); }
        /* ── Footer buttons ── */
        .footer-btn {
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            color: var(--text);
            padding: 13px;
            border-radius: var(--radius-md);
            flex: 1;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }
        .footer-btn:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
        .footer-btn:active { transform: scale(0.98); }
        /* ── Streak ── */
        .streak-dot.filled {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
            box-shadow: 0 0 12px rgba(26,158,92,0.45);
            transform: scale(1.25);
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .celebrate { animation: celebrate-pulse 0.5s infinite alternate; }
        @keyframes celebrate-pulse {
            from { transform: scale(1); }
            to { transform: scale(1.04); }
        }
        /* ── Notes timeline ── */
        #notes-list {
            position: relative;
            padding-left: 20px;
            margin-left: 8px;
            border-left: 2px solid var(--border);
        }
        .time-gap-container {
            position: relative;
            display: flex;
            align-items: center;
            margin: 8px 0;
            left: -30px;
            z-index: 10;
        }
        .duration-badge {
            background: var(--bg);
            color: var(--accent);
            border: 1.5px solid var(--accent-soft);
            font-size: 0.68rem;
            padding: 2px 9px;
            border-radius: 10px;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        .note-item {
            position: relative;
            margin-left: 10px;
            z-index: 5;
        }
        /* ── Modal ── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 9000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        #modal-overlay.visible { display: flex; }
        #modal-box {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px 24px 22px;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.2s ease-out;
            border: 1px solid var(--border);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        #modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 12px; color: var(--text); }
        #modal-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        #modal-textarea:focus { outline: none; border-color: var(--accent); }
        #modal-textarea.hidden { display: none; }
        #modal-message { font-size: 0.92rem; margin-bottom: 16px; color: var(--muted); }
        #modal-message.hidden { display: none; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: opacity 0.2s, transform 0.15s;
        }
        .modal-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .modal-btn-cancel  { background: var(--surface2); color: var(--text); }
        .modal-btn-confirm { background: var(--accent); color: white; }
        .modal-btn-danger  { background: var(--danger); color: white; }
        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 96px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--text);
            color: var(--bg);
            padding: 10px 22px;
            border-radius: 22px;
            font-size: 0.84rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            z-index: 8000;
            white-space: nowrap;
            box-shadow: var(--shadow-md);
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        /* ── Char counter ── */
        #char-counter { font-size: 0.72rem; color: var(--muted); text-align: right; margin-bottom: 12px; }
        #char-counter.warn { color: var(--danger); }
        /* ── AI Summary Box ── */
        #llm-controls {
            margin-bottom: 24px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        .llm-header {
            background: linear-gradient(135deg, #3d6bff 0%, #7b5cff 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .llm-header-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
        }
        #summarize-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.35);
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        #summarize-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
        #summarize-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #llm-status {
            font-size: 0.75rem;
            color: var(--muted);
            padding: 8px 16px 4px;
            text-align: center;
            background: var(--surface2);
            min-height: 0;
        }
        #daily-summary-output {
            background: var(--card-bg);
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }
        #daily-summary-output.has-content {
            padding: 20px;
            max-height: 600px;
        }
        /* Summary structured sections */
        .summary-section { margin-bottom: 18px; }
        .summary-section:last-child { margin-bottom: 0; }
        .summary-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .summary-wins {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .summary-win-item {
            background: rgba(26,158,92,0.08);
            border: 1px solid rgba(26,158,92,0.2);
            border-radius: var(--radius-sm);
            padding: 9px 13px;
            font-size: 0.88rem;
            line-height: 1.5;
            color: var(--text);
        }
        .summary-themes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .summary-theme-chip {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid rgba(61,107,255,0.2);
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .summary-focus-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text);
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
        }
        /* ══════════════════════════════════════════════════
         * TAG CLOUD  — two-row cap + overflow popover
         * ══════════════════════════════════════════════════ */
        #tag-cloud-wrap {
            position: relative;
            /* z-index creates a stacking context so the popover (z-index:600)
               layers above the search bar, calendar, and all siblings below */
            z-index: 10;
            margin-bottom: 22px;
        }

        /* Same flex container as before; pill is the last item inside it.
           Two-row cap: each .tag is ~28px tall + 6px gap = 62px for 2 rows. */
        #tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            /* 2-row cap. Each pill: ~28px tall. Two rows + one gap = 28+6+28 = 62px.
               The extra 1px prevents subpixel rounding from clipping row 2's border. */
            max-height: 63px;
            overflow: hidden;
        }

        /* Pill: same visual as .tag but muted colour + absolute position.
           JS sets top/right after measuring the tag layout. */
        #tag-more-btn {
            position: absolute;
            /* top/right set by JS */
            background: var(--surface2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            color: var(--muted);
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }
        #tag-more-btn:hover {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        #tag-more-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Overflow popover */
        .tag-overflow-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            left: 0;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 600;
            animation: slideUp 0.18s ease-out both;
            overflow: hidden;
        }
        .tag-overflow-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px 8px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }
        .tag-overflow-header button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.85rem;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s;
        }
        .tag-overflow-header button:hover { background: var(--surface2); }
        .tag-overflow-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 12px 14px 14px;
            max-height: 200px;
            overflow-y: auto;
        }

        /* ── Search ── */
        .search-wrapper {
            position: relative;
            z-index: 1;            /* below tag-cloud-wrap's stacking context */
            margin-bottom: 24px;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0.5;
            pointer-events: none;
        }
        #search-input {
            width: 100%;
            padding: 13px 16px 13px 40px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;

        /* ── Pomodoro ring timer ── */
        .pomo-ring-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 4px 0 16px;

        .pomo-ring-svg { transform: rotate(-90deg); }
        .pomo-ring-bg  { fill: none; stroke: var(--border); stroke-width: 6; }
        .pomo-ring-fg  {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.4s;
        }
        .pomo-ring-fg.work  { stroke: var(--accent); }
        .pomo-ring-fg.break { stroke: var(--success); }
        .pomo-time-label {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-top: -66px; /* overlay centre of ring */

            font-variant-numeric: tabular-nums;
        }
        .pomo-phase-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }
        .pomo-phase-label.work  { color: var(--accent); }
        .pomo-phase-label.break { color: var(--success); }
        .pomo-tomatoes {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        .pomo-controls {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .pomo-btn {
            flex: 1;
            height: 40px;           /* fixed height — prevents layout shift on label swap */
            padding: 0 8px;
            border-radius: var(--radius-sm);
            border: 1.5px solid transparent;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: "DM Sans", sans-serif;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
        }
        .pomo-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
        .pomo-btn:active { transform: scale(0.97); }
        .pomo-btn-primary  { background: var(--accent);  color: white; }
        .pomo-btn-success  { background: var(--success); color: white; }
        .pomo-btn-danger   { background: var(--danger);  color: white; }
        .pomo-btn-ghost    { background: transparent; color: var(--accent);
                             border: 1.5px solid var(--accent); }
        /* Pause/Resume button: fixed width = widest label so card never shifts */
        #pomo-pause-btn    { min-width: 96px; }
        @keyframes pomo-pulse {
            0%   { box-shadow: 0 0 0 3px var(--accent-soft); }
            50%  { box-shadow: 0 0 0 8px rgba(61,107,255,0.06); }
            100% { box-shadow: 0 0 0 3px var(--accent-soft); }
        }
        .focus-card.pomo-running { animation: pomo-pulse 3s ease-in-out infinite; }
        .focus-card.pomo-break   {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(26,158,92,0.12), var(--shadow-md);
        }
        /* ── Time nudge ── */
        #time-blindness-nudge {
            text-align: center;
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 18px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        /* ── Spinne animation for loading ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        /* ── AI on-device model UI ── */
        .model-picker-row {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
            align-items: center;
            flex-wrap: wrap;
        }
        .model-select {
            flex: 1;
            min-width: 0;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-size: 0.8rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .model-select:focus { outline: none; border-color: var(--accent); }
        .model-dl-note {
            font-size: 0.72rem;
            color: var(--muted);
            width: 100%;
            line-height: 1.4;
            padding: 0 2px;
        }
        /* Download progress bar */
        .dl-progress-wrap {
            padding: 10px 16px 14px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
        }
        .dl-progress-label {
            font-size: 0.74rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        .dl-progress-bar-outer {
            height: 5px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }
        .dl-progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #7b5cff);
            border-radius: 99px;
            width: 0%;
            transition: width 0.3s ease;
        }
        /* Misc */
        small { color: var(--muted); font-size: 0.78rem; }
        mark { background: rgba(61,107,255,0.2); color: var(--accent); border-radius: 3px; padding: 0 2px; }
        .note-actions { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; gap: 4px; }

        /* ── Slash command dropdown ── */
        #slash-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1.5px solid var(--accent);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            z-index: 500;
            animation: slideUp 0.15s ease-out both;
        }
        .slash-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .slash-item:last-child { border-bottom: none; }
        .slash-item.slash-active { background: var(--accent-soft); }
        .slash-item:hover { background: var(--accent-soft); }
        .slash-cmd {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--accent);
            min-width: 72px;
            font-family: 'DM Sans', sans-serif;
        }
        .slash-desc {
            font-size: 0.8rem;
            color: var(--muted);
        }
        .slash-icon { font-size: 1rem; width: 22px; text-align: center; }

        /* ── Next Up field ── */
        #next-up-wrap {
            margin: 10px 0 14px;
        }
        #next-up-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #next-up-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-sm);
            background: var(--card-bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, border-style 0.2s;
            box-sizing: border-box;
        }
        #next-up-input:focus {
            border-style: solid;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        #next-up-input::placeholder { color: var(--muted); opacity: 0.5; }
        #next-up-hint {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 4px;
            padding-left: 2px;
            opacity: 0.7;
        }


        /* ════════════════════════════════════════════════════
         * HOME HEADER  — time/date left · dopamine streak right
         * Both sides top-aligned. Left grows, right is fixed.
         * Stacks vertically only below 340 px.
         * ════════════════════════════════════════════════════ */
        .home-header {
            display: flex;
            align-items: flex-start;      /* top-align both columns */
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
            min-width: 0;
        }

        /* ── Left: time · date · nudge (stacked column) ── */
        .home-header__left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            flex: 1 1 0;
            min-width: 0;
        }

        /* Time and date on separate lines — cleaner than squeezing them inline */
        #live-time {
            font-size: 0.95rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            line-height: 1.2;
            white-space: nowrap;
        }
        #live-date {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--muted);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        #time-blindness-nudge {
            font-size: 0.7rem;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* ── Right: streak (fixed-width column, top-aligned) ── */
        .home-header__right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }
        .home-header__streak-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
            line-height: 1.2;
        }
        .home-header__dots {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .streak-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--border);
            flex-shrink: 0;
            transition: background-color 0.3s, border-color 0.3s, transform 0.3s;
        }
        .home-header__streak-msg {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--success);
            white-space: nowrap;
            animation: pop 0.3s ease;
            text-align: right;
        }

        /* ── Narrow: stack at < 340 px ── */
        @media (max-width: 339px) {
            .home-header {
                flex-direction: column;
                gap: 10px;
            }
            .home-header__right {
                flex-direction: row;
                align-items: center;
                width: 100%;
                justify-content: space-between;
            }
            .home-header__streak-msg {
                text-align: left;
            }
            #live-date {
                white-space: normal;
            }
        }

        /* ── Recent strip ── */
        #recent-strip {
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }
        .recent-strip-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .recent-note-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 14px 9px 16px;
            margin-bottom: 6px;
            position: relative;
            overflow: hidden;
        }
        .recent-note-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--border);
            border-radius: 3px 0 0 3px;
        }
        .recent-note-card.type-win::before  { background: var(--success); }
        .recent-note-card.type-todo::before { background: var(--accent); }
        .recent-note-card.type-block::before { background: var(--danger); }
        .recent-note-time {
            font-size: 0.7rem;
            color: var(--muted);
            margin-bottom: 3px;
        }
        .recent-note-text {
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
    <!-- web-llm loaded dynamically inside the module script -->
</head>

<script type="module">
'use strict';

/* =============================================================================
 * SECURITY LAYER
 *
 * All user content flows through these helpers. No raw user string ever
 * touches innerHTML directly — this eliminates stored XSS entirely.
 * ============================================================================= */

/** Sanitise a note ID. IDs are Date.now() integers; reject everything else. */
function sanitiseId(id) {
    const n = Number(id);
    return Number.isInteger(n) && n > 0 && n <= Number.MAX_SAFE_INTEGER ? n : null;
}

/** Validate & normalise a single note object. Returns null if malformed. */
function validateNote(note) {
    if (!note || typeof note !== 'object' || Array.isArray(note)) return null;
    const id = sanitiseId(note.id);
    if (!id) return null;
    if (typeof note.content !== 'string') return null;
    if (typeof note.timestamp !== 'string' || isNaN(Date.parse(note.timestamp))) return null;
    if (typeof note.dateKey !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(note.dateKey)) return null;
    return {
        id,
        timestamp: note.timestamp,
        content: note.content.slice(0, 5000),
        dateKey: note.dateKey,
        tags: Array.isArray(note.tags)
            ? note.tags.filter(t => typeof t === 'string' && /^#\w+$/.test(t)).slice(0, 20)
            : [],
    };
}

/** Safe JSON.parse — never throws. */
function safeJSON(str, fallback) {
    try { return JSON.parse(str) ?? fallback; } catch { return fallback; }
}

/* ── Notes cache: avoids re-parsing localStorage on every render ── */
let _notesCache    = null;  // null = dirty
let _notesCacheKey = '';    // localStorage string snapshot for cache invalidation

function getLocalNotes() {
    const raw = localStorage.getItem('journal_notes') || '[]';
    if (_notesCache !== null && _notesCacheKey === raw) return _notesCache;
    const parsed = safeJSON(raw, []);
    _notesCache    = Array.isArray(parsed) ? parsed.map(validateNote).filter(Boolean) : [];
    _notesCacheKey = raw;
    return _notesCache;
}
function _invalidateNotesCache() { _notesCache = null; _notesCacheKey = ''; }
function setLocalNotes(notes) {
    localStorage.setItem('journal_notes', JSON.stringify(notes));
    _invalidateNotesCache();
}

function getDeletedIds() {
    const raw = safeJSON(localStorage.getItem('journal_deleted_ids'), []);
    return Array.isArray(raw) ? raw.map(sanitiseId).filter(Boolean) : [];
}
function setDeletedIds(ids) { localStorage.setItem('journal_deleted_ids', JSON.stringify(ids)); }

/* =============================================================================
 * CUSTOM MODAL  (replaces prompt() / confirm())
 * ============================================================================= */
const modalOverlay  = document.getElementById('modal-overlay');
const modalTitle    = document.getElementById('modal-title');
const modalMessage  = document.getElementById('modal-message');
const modalTextarea = document.getElementById('modal-textarea');
const modalCancel   = document.getElementById('modal-cancel');
const modalConfirm  = document.getElementById('modal-confirm');
let _modalResolve   = null;

function showModal({ title, message, defaultValue, isDanger = false }) {
    return new Promise(resolve => {
        _modalResolve = resolve;
        modalTitle.textContent = title;
        if (message) { modalMessage.textContent = message; modalMessage.classList.remove('hidden'); }
        else { modalMessage.classList.add('hidden'); }
        if (defaultValue !== undefined) {
            modalTextarea.value = defaultValue;
            modalTextarea.classList.remove('hidden');
            requestAnimationFrame(() => { modalTextarea.focus(); modalTextarea.select(); });
        } else {
            modalTextarea.classList.add('hidden');
        }
        modalConfirm.className = `modal-btn ${isDanger ? 'modal-btn-danger' : 'modal-btn-confirm'}`;
        modalConfirm.textContent = isDanger ? 'Delete' : 'Save';
        modalOverlay.classList.add('visible');
    });
}
function closeModal(result) {
    modalOverlay.classList.remove('visible');
    if (_modalResolve) { _modalResolve(result); _modalResolve = null; }
}
modalConfirm.addEventListener('click', () =>
    closeModal(modalTextarea.classList.contains('hidden') ? true : modalTextarea.value.trim())
);
modalCancel.addEventListener('click', () => closeModal(null));
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(null); });
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modalOverlay.classList.contains('visible')) closeModal(null);
});

/* =============================================================================
 * TOAST
 * ============================================================================= */
const toastEl = document.getElementById('toast');
let _toastTimer = null;
function showToast(msg, ms = 2600) {

    _toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);

/* =============================================================================
 * 1. CONFIG & STATE
 * =============================================================================
 * SECURITY NOTE: CLIENT_ID is a public identifier, not a secret. It must be
 * registered in Google Cloud Console with the exact allowed origin. The
 * drive.appdata scope is strictly app-sandboxed — this app cannot read any
 * other file in the user's Drive.
 * ============================================================================= */
const CLIENT_ID = '629370111704-m36nu5qgi52071qgp0sfsbs5sa9ac80k.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/drive.appdata';

let tokenClient = null;
let accessToken = null;   // Lives in memory only, never persisted
let driveFileId = null;
let syncInterval = null;
let isSyncing    = false; // Mutex: prevents concurrent overlapping syncs

let currentMonth  = new Date();
let _activeTag    = null;   // currently selected tag filter, null = none
const noteInput   = document.getElementById('note-input');
const charCounter = document.getElementById('char-counter');

/* =============================================================================
 * SLASH COMMANDS
 * Triggered when user types / at the start or after a newline.
 * ============================================================================= */
const SLASH_COMMANDS = [
    { cmd: '/win',   icon: '🏆', desc: 'Log a win or achievement',    prefix: '🏆 ', tag: '#win'   },
    { cmd: '/todo',  icon: '☐',  desc: 'Add a checkbox task',         prefix: '☐ ',  tag: '#todo'  },
    { cmd: '/block', icon: '🚫', desc: 'Tag a distraction or blocker', prefix: '🚫 ', tag: '#block' },
    { cmd: '/focus', icon: '🎯', desc: 'Note your current focus',      prefix: '🎯 ', tag: '#focus' },
    { cmd: '/idea',  icon: '💡', desc: 'Capture a quick idea',         prefix: '💡 ', tag: '#idea'  },
    { cmd: '/note',  icon: '📝', desc: 'Plain note (no prefix)',       prefix: '',    tag: ''       },
];

const slashDropdown = document.getElementById('slash-dropdown');
let _slashActive    = -1;
let _slashQuery     = '';

function getSlashContext(val, pos) {
    // Find the nearest / before cursor that is at start or after newline
    const before = val.slice(0, pos);
    const match  = before.match(/(?:^|\n)(\/\w*)$/);
    return match ? match[1] : null;
}

function showSlashDropdown(query) {
    _slashQuery = query.toLowerCase();
    const filtered = SLASH_COMMANDS.filter(c => c.cmd.startsWith(_slashQuery));
    if (filtered.length === 0) { hideSlashDropdown(); return; }

    slashDropdown.innerHTML = '';
    _slashActive = 0;
    filtered.forEach((c, i) => {
        const item = document.createElement('div');
        item.className = 'slash-item' + (i === 0 ? ' slash-active' : '');
        item.setAttribute('role', 'option');
        item.dataset.index = i;

        const icon = document.createElement('span');
        icon.className = 'slash-icon';
        icon.textContent = c.icon;

        const cmd = document.createElement('span');
        cmd.className = 'slash-cmd';
        cmd.textContent = c.cmd;

        const desc = document.createElement('span');
        desc.className = 'slash-desc';
        desc.textContent = c.desc;

        item.append(icon, cmd, desc);
        item.addEventListener('mousedown', e => {
            e.preventDefault(); // keep focus on textarea
            applySlashCommand(filtered[i]);
        });
        slashDropdown.appendChild(item);
    });
    slashDropdown.style.display = 'block';
}

function hideSlashDropdown() {
    slashDropdown.style.display = 'none';
    slashDropdown.innerHTML = '';
    _slashActive = -1;
}

function setSlashActive(idx) {
    const items = slashDropdown.querySelectorAll('.slash-item');
    items.forEach((el, i) => el.classList.toggle('slash-active', i === idx));
    _slashActive = idx;
}

function applySlashCommand(cmd) {
    const val = noteInput.value;
    const pos = noteInput.selectionStart;
    // Replace the /xxx trigger with the prefix
    const before   = val.slice(0, pos);
    const after    = val.slice(pos);
    const replaced = before.replace(/(?:^|\n)(\/\w*)$/, (m, trigger) =>
        m.slice(0, m.length - trigger.length) + cmd.prefix
    );
    // Append tag to the full note (after any existing content)
    // Only add tag if one is defined and not already present
    const fullAfter = after.trimEnd();
    const tagSuffix = cmd.tag && !noteInput.value.includes(cmd.tag) ? ' ' + cmd.tag : '';
    noteInput.value = replaced + fullAfter + tagSuffix;
    // Place cursor right after the prefix (before the tag at the end)
    const newPos = replaced.length;
    noteInput.setSelectionRange(newPos, newPos);
    // Update char counter
    charCounter.textContent = `${noteInput.value.length} / 5000`;
    charCounter.classList.toggle('warn', noteInput.value.length >= 4500);
    hideSlashDropdown();
    noteInput.focus();
}

noteInput.addEventListener('input', () => {
    const len = noteInput.value.length;
    charCounter.textContent = `${len} / 5000`;
    charCounter.classList.toggle('warn', len >= 4500);

    // Slash command detection
    const query = getSlashContext(noteInput.value, noteInput.selectionStart);
    if (query !== null) {
        showSlashDropdown(query);
    } else {
        hideSlashDropdown();
    }
});

noteInput.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { saveNote(); return; }

    if (slashDropdown.style.display === 'none') return;
    const items = slashDropdown.querySelectorAll('.slash-item');
    if (items.length === 0) return;

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        setSlashActive((_slashActive + 1) % items.length);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setSlashActive((_slashActive - 1 + items.length) % items.length);
    } else if (e.key === 'Enter' || e.key === 'Tab') {
        e.preventDefault();
        const idx = Math.max(_slashActive, 0);
        const filtered = SLASH_COMMANDS.filter(c => c.cmd.startsWith(_slashQuery));
        if (filtered[idx]) applySlashCommand(filtered[idx]);
    } else if (e.key === 'Escape') {
        hideSlashDropdown();
    }
});

// Hide dropdown on outside click
document.addEventListener('click', e => {
    if (e.target !== noteInput) hideSlashDropdown();
});

/* =============================================================================
 * NEXT UP FIELD
 * ============================================================================= */
const nextUpInput = document.getElementById('next-up-input');

function getNextUp()       { return localStorage.getItem('next_up') || ''; }
function setNextUp(val)    { localStorage.setItem('next_up', val.slice(0, 200)); }

nextUpInput.addEventListener('input', () => {

/* =============================================================================
 * RECENT STRIP — last 3 notes shown on the write page
 * ============================================================================= */
function renderRecentStrip() {
    const strip    = document.getElementById('recent-strip');
    const listEl   = document.getElementById('recent-notes-list');
    // Partial sort: find the 3 most recent in O(n) rather than sorting all
    const allNotes = (() => {
        const ns = getLocalNotes();
        const top3 = [];
        for (const n of ns) {
            top3.push(n);
            if (top3.length > 3) {
                top3.sort((a,b) => b.timestamp > a.timestamp ? 1 : -1);
                top3.pop();
            }
        }
        return top3.sort((a,b) => b.timestamp > a.timestamp ? 1 : -1);
    })();

    listEl.innerHTML = '';
    if (allNotes.length === 0) { strip.style.display = 'none'; return; }
    strip.style.display = 'block';

    allNotes.forEach(n => {
        const card = document.createElement('div');
        // Detect type from content prefix for coloured left border
        const typeClass = n.content.startsWith('🏆') || n.content.startsWith('✅') ? 'type-win'
            : n.content.startsWith('☐') ? 'type-todo'
            : n.content.startsWith('🚫') ? 'type-block'
            : '';
        card.className = `recent-note-card ${typeClass}`;

        const timeEl = document.createElement('div');
        timeEl.className = 'recent-note-time';
        timeEl.textContent = new Date(n.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

        const textEl = document.createElement('div');
        textEl.className = 'recent-note-text';
        textEl.textContent = n.content.replace(/\n/g, ' ');

        card.append(timeEl, textEl);
        listEl.appendChild(card);
    });
}

const getISODate = d => {
    const dt = new Date(d);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
};

/* =============================================================================
 * 2. GOOGLE DRIVE SYNC
 * ============================================================================= */
function initGIS() {
    if (!window.google?.accounts) { setTimeout(initGIS, 500); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (response) => {
            if (response.error) { updateSyncUI('❌', 'Auth Error'); return; }
            accessToken = response.access_token;
            // Clear token before it expires (~1 h for Google OAuth tokens)
            setTimeout(() => { accessToken = null; }, 55 * 60 * 1000);
            await syncWithDrive();
            startPeriodicSync();
        },
    });
    // Silently restore session for returning users — no interaction required
    if (localStorage.getItem('auto_sync_enabled') === 'true') {
        tokenClient.requestAccessToken({ prompt: '' });
    }
}

function startPeriodicSync() {
    if (syncInterval) return;
    syncInterval = setInterval(async () => {
        if (accessToken && !isSyncing) await syncWithDrive(true);
    }, 3 * 60 * 1000);
}

async function handleAuthClick() {
    if (!tokenClient) { showToast('Google Sign-In not ready yet'); return; }
    if (!accessToken) {
        const hadPrior = localStorage.getItem('auto_sync_enabled') === 'true';
        tokenClient.requestAccessToken({ prompt: hadPrior ? '' : 'select_account' });
    } else {
        await syncWithDrive();
    }
}

function updateSyncUI(icon, text) {
    document.getElementById('sync-icon').textContent = icon;
    document.getElementById('sync-text').textContent = text;
}

/**
 * Thin fetch wrapper that enforces googleapis.com as the only allowed host.
 * SECURITY: Prevents token leakage if a URL were ever constructed from
 * user-controlled data (defence in depth).
 */
async function apiFetch(url, method = 'GET', body, extraHeaders = {}) {
    const { hostname } = new URL(url);
    if (!hostname.endsWith('googleapis.com')) throw new Error(`Blocked: ${hostname}`);
    return fetch(url, {
        method,
        headers: { Authorization: `Bearer ${accessToken}`, ...extraHeaders },
        ...(body !== undefined && { body }),
    });
}

async function syncWithDrive(silent = false) {
    if (isSyncing) return;
    isSyncing = true;
    try {
        if (!silent) updateSyncUI('⏳', 'Syncing…');

        // List files sorted newest-first; fields param minimises payload
        const listRes = await apiFetch(
            `https://www.googleapis.com/drive/v3/files?q=name%3D'journal_data.json'&spaces=appDataFolder&fields=files(id%2CmodifiedTime)&orderBy=modifiedTime+desc`
        );
        if (!listRes.ok) throw new Error(`Drive list: ${listRes.status}`);
        const { files } = await listRes.json();

        // Purge duplicate files left by the old single-device bug
        if (Array.isArray(files) && files.length > 1) {
            await Promise.all(
                files.slice(1).map(f =>
                    apiFetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(f.id)}`, 'DELETE')
                )
            );
        }

        if (Array.isArray(files) && files.length > 0) {
            driveFileId = files[0].id;
            const fileRes = await apiFetch(
                `https://www.googleapis.com/drive/v3/files/${encodeURIComponent(driveFileId)}?alt=media`
            );
            if (fileRes.ok) {
                const driveData = await fileRes.json();
                mergeNotes(driveData); // validation happens inside mergeNotes
            }
        }

        await uploadToDrive();
        localStorage.setItem('auto_sync_enabled', 'true');
        if (!silent) {
            updateSyncUI('✅', 'Synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
            showToast('✅ Synced with Google Drive');
        }
    } catch (err) {
        console.error('Sync error:', err);
        if (!silent) updateSyncUI('❌', 'Sync Error');
    } finally {
        isSyncing = false;
    }
}

async function uploadToDrive() {
    if (!accessToken) return;

    // Avoid creating a duplicate file when driveFileId is unknown
    if (!driveFileId) {
        const checkRes = await apiFetch(
            `https://www.googleapis.com/drive/v3/files?q=name%3D'journal_data.json'&spaces=appDataFolder&fields=files(id)`
        );
        if (checkRes.ok) {
            const { files } = await checkRes.json();
            if (Array.isArray(files) && files.length > 0) driveFileId = files[0].id;
        }
    }

    const payload  = JSON.stringify({ notes: getLocalNotes(), deletedIds: getDeletedIds() });
    const metadata = driveFileId ? {} : { name: 'journal_data.json', parents: ['appDataFolder'] };
    const boundary = 'journal_sync_v1';
    const body =
        `\r\n--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` + JSON.stringify(metadata) +
        `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` + payload +
        `\r\n--${boundary}--`;

    const url = driveFileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${encodeURIComponent(driveFileId)}?uploadType=multipart`
        : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

    const res = await apiFetch(url, driveFileId ? 'PATCH' : 'POST', body, {
        'Content-Type': `multipart/related; boundary=${boundary}`,
    });
    if (!driveFileId && res.ok) driveFileId = (await res.json()).id;
}

function mergeNotes(driveData) {
    // Backwards-compatible with the old plain-array format
    const rawDriveNotes   = Array.isArray(driveData) ? driveData : (driveData?.notes ?? []);
    const rawDriveDeleted = Array.isArray(driveData) ? [] : (driveData?.deletedIds ?? []);

    // SECURITY: validate every note arriving from Drive before touching localStorage
    const driveNotes   = rawDriveNotes.map(validateNote).filter(Boolean);
    const driveDeleted = rawDriveDeleted.map(sanitiseId).filter(Boolean);

    const localNotes   = getLocalNotes();
    const localDeleted = getDeletedIds();
    const allDeleted   = new Set([...localDeleted, ...driveDeleted]);

    // Last-writer-wins merge
    const merged = new Map();
    [...localNotes, ...driveNotes].forEach(n => {
        const ex = merged.get(n.id);
        if (!ex || new Date(n.timestamp) > new Date(ex.timestamp)) merged.set(n.id, n);
    });
    allDeleted.forEach(id => merged.delete(id));

    setLocalNotes(Array.from(merged.values()));
    setDeletedIds(Array.from(allDeleted));

    const titleEl = document.getElementById('selected-date-title');
    if (titleEl.textContent.startsWith('Notes for ')) {
        showNotesForDay(titleEl.textContent.replace('Notes for ', '').trim());
    }
    renderAll();
}

/* =============================================================================
 * 3. POMODORO + FOCUS
 *
 * State lives in localStorage so it survives PWA reloads mid-session.
 * Keys: pomo_goal, pomo_phase (work|break|idle), pomo_end_ms,
 *       pomo_rounds, pomo_session_start, pomo_paused_remaining,
 *       focus_streak
 *
 * Ring maths: r=52, circumference = 2π×52 ≈ 326.73
 * stroke-dashoffset = circumference × (1 − progress)  → 0 = full, 326.73 = empty
 * ============================================================================= */

const POMO_WORK_SECS  = 25 * 60;
const POMO_SHORT_SECS =  5 * 60;
const POMO_LONG_SECS  = 15 * 60;
const POMO_CIRC       = 326.73;   // 2π × r=52

let _pomoTick        = null;   // setInterval handle — null when stopped
let _pomoPhaseEnding = false;  // re-entrance guard

/* ── Audio tone — reuse a single AudioContext (browsers limit active contexts) ── */
let _audioCtx = null;
function _getAudioCtx() {
    if (!_audioCtx || _audioCtx.state === 'closed') {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Resume if suspended (iOS Safari suspends on page load)
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    return _audioCtx;
}
function playTone(freq = 660, dur = 0.3, type = 'sine') {
    try {
        const ctx  = _getAudioCtx();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
}
function playWorkDone()  { playTone(880, 0.15); setTimeout(() => playTone(1100, 0.25), 180); }
function playBreakDone() { playTone(660, 0.15); setTimeout(() => playTone(880,  0.25), 180); }

/* ── Streak UI ─────────────────────────────────────────────────────────── */

            document.getElementById('focus-section').classList.remove('celebrate');

}
